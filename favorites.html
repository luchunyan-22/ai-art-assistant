<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏夹 - AI绘画创作助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] } } } }</script>
    <style>body { font-family: 'Noto Sans SC', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm px-6 py-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2 text-purple-600"><span>←</span><span>返回首页</span></a>
            <h1 class="text-lg font-bold">⭐ 收藏夹</h1>
            <div class="w-20"></div>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-8">
        <div id="favorites-list">
            <div class="text-center py-20">
                <p class="text-6xl mb-4">⭐</p>
                <p class="text-gray-500">暂无收藏</p>
                <a href="generator.html" class="text-purple-600 hover:underline mt-2 inline-block">去创作并收藏 →</a>
            </div>
        </div>
    </main>
    <script>
        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            const container = document.getElementById('favorites-list');
            if (favorites.length === 0) return;
            container.innerHTML = favorites.map(function(item) {
                return '<div class="bg-white rounded-xl shadow-sm p-4 mb-4">' +
                    '<p class="text-gray-800 font-medium mb-1">' + (item.user_input || '无描述') + '</p>' +
                    '<p class="text-gray-500 text-sm bg-gray-50 p-2 rounded mb-2">' + (item.final_prompt || '') + '</p>' +
                    '<div class="flex justify-between items-center text-xs text-gray-400">' +
                    '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded">' + (item.style || '默认') + '</span>' +
                    '<div><button onclick="copyPrompt(\'' + item.id + '\')" class="text-purple-600 mr-3">📋 复制</button><button onclick="removeFavorite(\'' + item.id + '\')" class="text-gray-400 hover:text-red-500">🗑️</button></div></div></div>';
            }).join('');
        }
        function copyPrompt(id) {
            const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            const item = favorites.find(function(f) { return f.id === id; });
            if (item) navigator.clipboard.writeText(item.final_prompt || '').then(function() { alert('已复制！'); });
        }
        function removeFavorite(id) {
            let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
            favorites = favorites.filter(function(f) { return f.id !== id; });
            localStorage.setItem('favorites', JSON.stringify(favorites));
            loadFavorites();
        }
        loadFavorites();
    </script>
</body>
</html>
